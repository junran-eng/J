<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>吉康 AI 推广工作流</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="toast-container" id="toasts"></div>
<div class="dialog-overlay hide" id="rejectDialog">
  <div class="dialog-box">
    <h3>驳回原因</h3>
    <textarea id="rejectReason" placeholder="请输入驳回原因（必填）..."></textarea>
    <div class="dialog-actions">
      <button class="dialog-cancel" onclick="closeRejectDialog()">取消</button>
      <button class="dialog-confirm" onclick="confirmReject()">确认驳回</button>
    </div>
  </div>
</div>

<button class="hamburger" onclick="toggleSidebar()">&#9776;</button>
<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

<div class="app">
<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <h1>吉康 AI</h1>
    <span class="ver">v5</span>
  </div>
  <button class="btn-new" onclick="newSession()">+ 新建会话</button>
  <button class="btn-export" onclick="exportApproved()">&#128229; 导出已审核</button>
  <div class="search-box">
    <span class="search-icon">&#128269;</span>
    <input type="text" id="searchInput" placeholder="搜索历史会话..." oninput="loadSessions()">
  </div>
  <div class="stats" id="statsBox">
    <span>累计 <span class="val" id="statTotal">-</span></span>
    <span>均分 <span class="val" id="statAvg">-</span></span>
    <span>今日 <span class="val" id="statToday">-</span></span>
    <span>待审 <span class="val pending" id="statPending">-</span></span>
    <span>Token <span class="val" id="statTokens">-</span></span>
  </div>
  <div class="slist" id="sessionList"></div>

  <div class="perf-dashboard" id="perfDashboard">
    <div class="perf-dash-header" onclick="document.getElementById('perfDashBody').classList.toggle('hide')">&#128200; 效果概览</div>
    <div id="perfDashBody"></div>
  </div>

  <div class="perf-dashboard" id="trendsPanel">
    <div class="perf-dash-header" onclick="document.getElementById('trendsBody').classList.toggle('hide');if(!document.getElementById('trendsBody').classList.contains('hide'))loadTrends()">&#128202; 质量趋势</div>
    <div id="trendsBody" class="hide"></div>
  </div>

  <div class="perf-dashboard" id="coveragePanel">
    <div class="perf-dash-header" onclick="document.getElementById('coverageBody').classList.toggle('hide');if(!document.getElementById('coverageBody').classList.contains('hide'))loadCoverage()">&#127758; 内容覆盖率</div>
    <div id="coverageBody" class="hide"></div>
  </div>

  <button class="btn-export" onclick="toggleKBManager()" style="margin-top:4px">&#128218; 知识库管理</button>
  <div class="kb-manager hide" id="kbManager">
    <div class="kb-header">知识库文件 <button class="kb-add-btn" onclick="kbAddFile()">+ 新建</button></div>
    <div class="kb-search-row"><input id="kbSearchInput" placeholder="搜索文件名或标题..." oninput="loadKBList()"></div>
    <div class="kb-list" id="kbList"></div>
    <div class="kb-editor hide" id="kbEditor">
      <input id="kbEditPath" placeholder="文件路径 (如 tech/选型指南.md)">
      <textarea id="kbEditContent" placeholder="Markdown 内容..." rows="8"></textarea>
      <div class="kb-editor-actions">
        <button onclick="kbSave()">保存</button>
        <button onclick="document.getElementById('kbEditor').classList.add('hide')">取消</button>
      </div>
    </div>
  </div>

  <div class="review-panel" id="reviewPanel">
    <div class="review-header" onclick="toggleReview()">
      <span>&#128220; 待审核</span>
      <span class="badge-count zero" id="pendingCount">0</span>
    </div>
    <div class="review-list hide" id="reviewList"></div>
  </div>
</aside>

<main class="main">
  <div class="topbar">
    <div class="mode-group" id="modeGroup">
      <button class="mode-btn on" data-mode="now" onclick="setMode('now')">&#9889; 立即生成</button>
      <button class="mode-btn" data-mode="once" onclick="setMode('once')">&#9200; 定时一次</button>
      <button class="mode-btn" data-mode="cron" onclick="setMode('cron')">&#128260; 周期重复</button>
    </div>
    <span id="timeCfg" class="time-cfg hide">
      <select id="sY"></select>年 <select id="sM"></select>月 <select id="sD"></select>日
      <select id="sH"></select>:<select id="sMin"></select>
      <button class="btn-sm primary" onclick="scheduleOnce()">确认定时</button>
    </span>
    <span id="cronCfg" class="hide" style="display:flex;gap:6px;align-items:center">
      <select id="cronP">
        <option value="0 9 * * *">每天 9:00</option>
        <option value="0 14 * * *">每天 14:00</option>
        <option value="0 9 * * 1-5">工作日 9:00</option>
        <option value="0 9 * * 1">每周一 9:00</option>
      </select>
      <button class="btn-sm primary" onclick="scheduleCron()">确认周期</button>
    </span>
    <label class="toggle-row" title="标准模式生成3个版本（标准版+数据版+故事版），快速模式只生成1个标准版，省2/3时间">
      <input type="checkbox" id="fastMode" onchange="updateFastHint()"><span>&#9889; 快速</span>
    </label>
    <span class="filter-group" id="filterGroup">
      <select id="filterType" onchange="loadSessions()">
        <option value="">全部类型</option>
        <option value="tech">技术讲解</option>
        <option value="policy">政策解读</option>
        <option value="event">事件报道</option>
      </select>
      <input type="date" id="filterDateFrom" onchange="loadSessions()" title="开始日期">
      <input type="date" id="filterDateTo" onchange="loadSessions()" title="结束日期">
      <button class="filter-btn" onclick="_sessionPage=0;loadSessions(false)">筛选</button>
      <button class="filter-btn" onclick="resetFilters()">重置</button>
    </span>
    <button class="cal-btn" onclick="toggleCalendar()">&#128197; 日历</button>
    <button class="cal-btn" onclick="toggleNotifications()" id="notifBtn" style="position:relative">&#128276; 通知<span class="notif-dot hide" id="notifDot"></span></button>
    <div class="calendar-dropdown hide" id="notifDropdown">
      <div class="notif-header">最近通知 <button class="notif-clear" onclick="clearNotifications()">清空</button></div>
      <div class="notif-list" id="notifList"></div>
    </div>
    <div class="jobs-bar" id="jobsBar"></div>
    <div class="calendar-dropdown hide" id="calendarDropdown"></div>
  </div>

  <div class="chat" id="chatBox">
    <div class="welcome" id="welcomeScreen">
      <div class="icon">&#x1f4dd;</div>
      <h2 id="welcomeTitle">开始撰写推广文</h2>
      <p id="welcomeDesc">输入主题，AI 将自动完成内容类型识别、行业信息采集、多版本生成和评审排序。</p>
      <div class="quick-topics" id="quickTopics">
        <span class="quick-tag" onclick="quickSend('低温除湿干化技术原理解析')">低温干化技术原理</span>
        <span class="quick-tag" onclick="quickSend('污泥处置新标准解读')">污泥处置新标准</span>
        <span class="quick-tag" onclick="quickSend('吉康环境行业展会参展纪要')">行业展会纪要</span>
        <span class="quick-tag" onclick="quickSend('热泵干化设备选型指南')">设备选型指南</span>
        <span class="quick-tag" onclick="quickSend('环保排放政策对企业的影响')">环保政策解读</span>
        <span class="quick-tag" onclick="quickSend('污泥干化经济效益分析')">经济效益分析</span>
      </div>
    </div>
  </div>

  <div class="ibar">
    <textarea id="input" placeholder="输入推广主题，按 Enter 发送，Shift+Enter 换行..." rows="1"
      onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send()}"></textarea>
    <select id="modelSel">
      <option value="deepseek-v4-flash">DeepSeek V4 Flash</option>
      <option value="deepseek-v4-pro">DeepSeek V4 Pro</option>
      <option value="deepseek-chat">DeepSeek Chat</option>
    </select>
    <button class="btn btn-go" id="sendBtn" onclick="send()">&#10148; 发送</button>
    <button class="btn btn-stop hide" id="stopBtn" onclick="doStop()">&#9724; 停止</button>
  </div>
</main>
</div><script>
var state = {
  sid: null, loading: false, mode: 'now', sessions: [], versions: {},
  reviewOpen: true, activePopover: null, rejectSid: null, configOK: true,
  lastTopic: null,
};

(function init() {
  document.getElementById('filterType').addEventListener('change',function(){_sessionPage=0;loadSessions(false);});
  document.getElementById('filterDateFrom').addEventListener('change',function(){_sessionPage=0;loadSessions(false);});
  document.getElementById('filterDateTo').addEventListener('change',function(){_sessionPage=0;loadSessions(false);});
  document.getElementById('searchInput').addEventListener('input',function(){_sessionPage=0;loadSessions(false);});
  buildTimeSelects();
  checkConfig();
  loadSessions(); loadJobs(); loadStats(); loadPendingReviews(); loadPerfDashboard();
  setInterval(function() { loadJobs(); loadStats(); loadPendingReviews(); loadPerfDashboard(); }, 30000);
  document.addEventListener('click', function(e) {
    if (state.activePopover && !e.target.closest('.perf-popover') && !e.target.closest('.perf-btn')) closePopover();
  });
})();

function buildTimeSelects() {
  var now = new Date(), y = now.getFullYear();
  function fill(id, vals, def) {
    var s = document.getElementById(id);
    vals.forEach(function(v) {
      var o = document.createElement('option'); o.value = v; o.textContent = v;
      if (v == def) o.selected = true; s.appendChild(o);
    });
  }
  fill('sY', [y, y+1, y+2], y);
  fill('sM', Array.from({length:12},function(_,i){return i+1}), now.getMonth()+1);
  fill('sD', Array.from({length:31},function(_,i){return i+1}), now.getDate());
  fill('sH', Array.from({length:24},function(_,i){return String(i).padStart(2,'0')}), '09');
  fill('sMin', [0,5,10,15,20,25,30,35,40,45,50,55], 0);
}

// ============================================================
// Config check
// ============================================================
function checkConfig() {
  fetch('/api/config/status')
    .then(function(r) { return r.json(); })
    .then(function(d) {
      if (!d.ok) {
        state.configOK = false;
        var h = '<div class="setup-guide">'
          + '<div class="icon">&#9888;&#65039;</div>'
          + '<h2>配置未完成</h2>'
          + '<div class="issue-list">';
        d.issues.forEach(function(iss) {
          h += '<div class="issue-item">' + esc(iss) + '</div>';
        });
        h += '</div>'
          + '<div class="guide-note">请编辑项目根目录的 <code>.env</code> 文件，参考 <code>.env.example</code> 填写必要配置后重启服务。</div>'
          + '</div>';
        document.getElementById('chatBox').innerHTML = h;
        document.getElementById('sendBtn').disabled = true;
      } else {
        document.getElementById('sendBtn').disabled = false;
      }
    });
}

// ============================================================
// Mode / Toast
// ============================================================
function setMode(m) {
  state.mode = m;
  document.querySelectorAll('.mode-btn').forEach(function(b) { b.classList.toggle('on', b.dataset.mode === m); });
  document.getElementById('timeCfg').classList.toggle('hide', m !== 'once');
  document.getElementById('cronCfg').classList.toggle('hide', m !== 'cron');
}
function updateFastHint() {
  document.getElementById('sendBtn').textContent = document.getElementById('fastMode').checked ? '⚡ 快速发送' : '➤ 发送';
}
function toast(msg, type) {
  type = type || 'success';
  var c = document.getElementById('toasts'), el = document.createElement('div');
  el.className = 'toast ' + type; el.textContent = msg; c.appendChild(el);
  setTimeout(function() { el.remove(); }, 3000);
}

// ============================================================
// Sessions
// ============================================================
var _sessionPage = 0;
function loadSessions(reset) {
  if (reset) _sessionPage = 0;
  var type = document.getElementById('filterType').value;
  var from = document.getElementById('filterDateFrom').value;
  var to = document.getElementById('filterDateTo').value;
  var q = document.getElementById('searchInput').value.trim();
  var params = new URLSearchParams();
  if (type) params.set('content_type', type);
  if (from) params.set('date_from', from);
  if (to) params.set('date_to', to);
  if (q) params.set('q', q);
  params.set('limit', String(50 + _sessionPage * 50));
  var url = '/api/sessions' + (params.toString() ? '?' + params.toString() : '');
  fetch(url).then(function(r) { return r.json(); })
    .then(function(d) { state.sessions = d.sessions || []; renderSessions(state.sessions); });
}
function loadMoreSessions() {
  _sessionPage++;
  loadSessions();
}
function renderSessions(list) {
  var h = '';
  (list || []).forEach(function(s) {
    h += '<div class="sitem' + (s.id === state.sid ? ' on' : '') + '" onclick="openSession(\'' + s.id + '\')">'
      + '<div class="title">' + esc(s.title) + '</div>'
      + '<div class="meta"><span>' + (s.created_at||'').slice(0,10) + '</span><span class="sess-type">' + (s.content_type||'-') + '</span>'
      + '<span class="meta-actions">'
      + '<button class="perf-btn" title="效果数据" onclick="event.stopPropagation();showPerfPopover(\'' + s.id + '\',this)">&#128202;</button>'
      + '<span class="del" onclick="event.stopPropagation();deleteSession(\'' + s.id + '\')">删除</span>'
      + '</span></div></div>';
  });
  document.getElementById('sessionList').innerHTML = h
    || '<div style="padding:16px;color:var(--ts);font-size:12px;text-align:center">暂无历史会话</div>';
}

function loadStats() {
  fetch('/api/stats').then(function(r) { return r.json(); })
    .then(function(d) {
      document.getElementById('statTotal').textContent = d.total || 0;
      document.getElementById('statAvg').textContent = d.avg_score || 0;
      document.getElementById('statToday').textContent = d.today || 0;
      document.getElementById('statPending').textContent = d.pending || 0;
      var tk = d.total_tokens || 0;
      var cost = d.estimated_cost || 0;
      document.getElementById('statTokens').textContent = (tk > 1000 ? (tk/1000).toFixed(0)+'k' : tk) + ' (¥' + cost.toFixed(1) + ')';
    });
}

function loadJobs() {
  fetch('/api/schedule/list').then(function(r) { return r.json(); })
    .then(function(d) {
      var h = '';
      (d.jobs||[]).forEach(function(j) {
        h += '<span class="job-tag">&#9200; '+(j.next||'').slice(0,16)+' <span class="jcancel" onclick="cancelJob(\''+j.id+'\')">x</span></span>';
      });
      document.getElementById('jobsBar').innerHTML = h;
    });
}

function newSession() {
  state.sid = null; document.getElementById('chatBox').innerHTML = ''; showWelcome();
  document.getElementById('input').focus(); loadSessions();
}
function openSession(sid) {
  state.sid = sid;
  document.getElementById('chatBox').innerHTML = '<div style="text-align:center;color:var(--ts);padding:40px">加载中...</div>';
  fetch('/api/sessions/'+sid).then(function(r){return r.json()}).then(function(d){
    var h='';
    (d.messages||[]).forEach(function(m){
      if(m.role==='user') h+='<div class="msg user">'+esc(m.content)+'</div>';
      else h+=renderAgentMsg(m);
    });
    document.getElementById('chatBox').innerHTML=h||'<div class="welcome"><p>空会话</p></div>';
    document.getElementById('chatBox').scrollTop=document.getElementById('chatBox').scrollHeight;
  }).catch(function(){document.getElementById('chatBox').innerHTML='<div style="color:var(--r);padding:40px;text-align:center">加载失败</div>'});
}
function deleteSession(sid){if(!confirm('确认删除？'))return;fetch('/api/sessions/'+sid,{method:'DELETE'}).then(function(r){return r.json()}).then(function(d){if(d.ok){toast('已删除');loadSessions();loadStats();}})}
function cancelJob(jid){
  fetch('/api/schedule/cancel',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:new URLSearchParams({job_id:jid})})
    .then(function(r){return r.json()}).then(function(d){if(d.ok){toast('已取消');loadJobs();}});
}
function resetFilters(){document.getElementById('filterType').value='';document.getElementById('filterDateFrom').value='';document.getElementById('filterDateTo').value='';document.getElementById('searchInput').value='';loadSessions();}

// ============================================================
// Review
// ============================================================
function showReviewBody(sid, el) {
  var preview = el.querySelector('.review-body-preview');
  if (!preview) {
    preview = document.createElement('div');
    preview.className = 'review-body-preview';
    preview.textContent = '加载中...';
    el.appendChild(preview);
    fetch('/api/review/' + sid + '/body')
      .then(function(r) { return r.json(); })
      .then(function(d) {
        preview.innerHTML = renderMarkdown(d.body || '(无内容)');
        preview.classList.add('open');
      })
      .catch(function() { preview.textContent = '加载失败'; });
  }
  preview.classList.toggle('open');
}

function loadPendingReviews() {
  fetch('/api/review/pending').then(function(r){return r.json()}).then(function(d){
    var items = d.pending||[];
    document.getElementById('pendingCount').textContent = items.length;
    document.getElementById('pendingCount').classList.toggle('zero', items.length===0);
    var h='';
    items.forEach(function(item){
      h+='<div class="review-item" onclick="showReviewBody(\''+item.id+'\',this)">'
        +'<div class="r-title">'+esc(item.title||'（无标题）')+'</div>'
        +'<div class="r-meta"><span>'+esc(item.content_type||'-')+'</span><span>&#11088; '+(item.score||'-')+'</span></div>'
        +'<div class="r-actions">'
        +'<button class="r-btn approve" onclick="event.stopPropagation();approveOne(\''+item.id+'\')">&#10003; 通过</button>'
        +'<button class="r-btn reject" onclick="event.stopPropagation();openRejectDialog(\''+item.id+'\')">&#10007; 驳回</button>'
        +'<button class="r-btn regen" onclick="event.stopPropagation();regenOne(\''+item.id+'\')">&#8634; 重新生成</button>'
        +'<button class="r-btn comment-btn" onclick="event.stopPropagation();openReviewComment(\''+item.id+'\',this.parentElement.parentElement)">&#128172; 批注</button>'
        +'<button class="r-btn audit-btn" onclick="event.stopPropagation();showAuditLog(\''+item.id+'\',this.parentElement.parentElement)">&#128269; 审计</button>'
        +'</div></div>';
    });
    document.getElementById('reviewList').innerHTML=h||'<div style="padding:8px;color:var(--ts);font-size:10px;text-align:center">暂无待审核</div>';
  });
}
function toggleReview(){state.reviewOpen=!state.reviewOpen;document.getElementById('reviewList').classList.toggle('hide',!state.reviewOpen);}
function approveOne(sid){
  fetch('/api/review/approve',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:new URLSearchParams({session_id:sid})})
    .then(function(r){return r.json()}).then(function(d){if(d.ok){toast('已通过');loadPendingReviews();loadSessions();loadStats();}});
}
function openRejectDialog(sid){state.rejectSid=sid;document.getElementById('rejectReason').value='';document.getElementById('rejectDialog').classList.remove('hide');}
function closeRejectDialog(){state.rejectSid=null;document.getElementById('rejectDialog').classList.add('hide');}
function confirmReject(){
  var reason=document.getElementById('rejectReason').value.trim();
  if(!reason){toast('请输入驳回原因','error');return;}
  fetch('/api/review/reject',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:new URLSearchParams({session_id:state.rejectSid,reason:reason})})
    .then(function(r){return r.json()}).then(function(d){if(d.ok){toast('已驳回');closeRejectDialog();loadPendingReviews();loadSessions();loadStats();}});
}
function regenOne(sid){
  fetch('/api/review/regen',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:new URLSearchParams({session_id:sid})})
    .then(function(r){return r.json()}).then(function(d){if(d.ok){toast('已提交重新生成，完成后请刷新查看');loadPendingReviews();}});
}

// ============================================================
// Perf Dashboard
// ============================================================
function loadPerfDashboard() {
  fetch('/api/performance/stats').then(function(r){return r.json()}).then(function(d){
    var types=d.by_type||[];
    var styles=d.by_style||[];
    var h='';
    var maxReads=1;
    types.forEach(function(t){maxReads=Math.max(maxReads,t.avg_reads||0);});
    types.forEach(function(t){
      var pct=Math.round((t.avg_reads||0)/maxReads*100);
      h+='<div class="perf-dash-row">'
        +'<span class="perf-dash-label">'+esc(t.content_type||'-')+'</span>'
        +'<div class="perf-dash-bar-track"><div class="perf-dash-bar-fill" style="width:'+pct+'%"></div></div>'
        +'<span class="perf-dash-val">'+(t.avg_reads||0).toFixed(0)+'阅</span>'
        +'</div>';
    });
    if(styles.length>0){
      h+='<div style="font-size:10px;color:var(--ts);margin:8px 0 2px;font-weight:700">按版本风格</div>';
      var maxSR=1;
      styles.forEach(function(s){maxSR=Math.max(maxSR,s.avg_reads||0);});
      styles.forEach(function(s){
        var pct=Math.round((s.avg_reads||0)/maxSR*100);
        h+='<div class="perf-dash-row">'
          +'<span class="perf-dash-label">'+esc(s.published_style||'-')+'</span>'
          +'<div class="perf-dash-bar-track"><div class="perf-dash-bar-fill" style="width:'+pct+'%;background:var(--w)"></div></div>'
          +'<span class="perf-dash-val">'+(s.avg_reads||0).toFixed(0)+'阅</span>'
          +'</div>';
      });
    }
    document.getElementById('perfDashBody').innerHTML=h||'<div style="font-size:10px;color:var(--ts);padding:4px 0">暂无效果数据</div>';
  });
}

// ============================================================
// Notifications
// ============================================================
function toggleNotifications(){
  var dd=document.getElementById('notifDropdown');
  if(dd.classList.contains('hide')){
    fetch('/api/notifications').then(function(r){return r.json()}).then(function(d){
      var items=d.items||[];
      var h='';
      items.forEach(function(n){
        var icon=n.status==='success'?'&#9989;':n.status==='fail'?'&#10060;':'&#128276;';
        h+='<div class="notif-item"><span>'+icon+'</span><div><div class="notif-title">'+esc(n.title||'')+'</div><div class="notif-time">'+(n.time||'').slice(0,16)+'</div></div></div>';
      });
      document.getElementById('notifList').innerHTML=h||'<div style="padding:8px;color:var(--ts);font-size:11px;text-align:center">暂无通知</div>';
      document.getElementById('notifDot').classList.add('hide');
    });
    dd.classList.remove('hide');
  }else{dd.classList.add('hide');}
}

function calBatchImport(){
  var text=document.getElementById('calBatchInput').value.trim();
  if(!text){toast('请粘贴选题数据','error');return;}
  var lines=text.split('\n'),count=0;
  function importNext(i){
    if(i>=lines.length){toast('成功导入 '+count+' 条');toggleCalendar();toggleCalendar();return;}
    var line=lines[i].trim();if(!line){importNext(i+1);return;}
    var parts=line.split(','),date=parts[0]||'',topic=parts[1]||'',type=parts[2]||'tech',priority=parts[3]||'normal',series=parts[4]||'';
    if(!date||!topic){importNext(i+1);return;}
    var params=new URLSearchParams({date:date,topic:topic,type:type,priority:priority});
    if(series) params.set('series',series);

      .then(function(r){return r.json()}).then(function(d){if(d.ok)count++;importNext(i+1);})

function sendCustomFb(msgId){
  var inp=document.getElementById('cfbInput-'+msgId);if(!inp)return;
  var fb=inp.value.trim();if(!fb)return;
  inp.value='';
  if(!state.lastTopic){toast('请先生成一篇文章','error');return;}
  document.getElementById('input').value=fb;

  if(state.loading||!state.configOK)return;

    .then(function(r){

  var params=new URLSearchParams({topic:state.lastTopic||topic,model:document.getElementById('modelSel').value,fast:fast});
  if(isFeedback) params.set('feedback',topic);
  if(isFeedback) params.set('keywords',topic);

    .then(function(r){
      var reader=r.body.getReader(),decoder=new TextDecoder(),buf='';
      function pump(){reader.read().then(function(v){
        if(v.done){setLoading(false);return;}
        buf+=decoder.decode(v.value,{stream:true});var lines=buf.split('\n');buf=lines.pop();
        lines.forEach(function(l){if(!l.startsWith('data: '))return;
          try{var d=JSON.parse(l.slice(6));if(d.stage)updateProgress(d.stage);else if(d.done){finalizeResult(d);loadSessions();loadStats();}else if(d.stopped){removeProgress();setLoading(false);toast('已取消生成','error');}else if(d.heartbeat){/* keepalive */}}
          catch(e){console.error('[SSE] parse error:',e.message,'raw:',l.slice(0,200));}
        });pump();
      }).catch(function(err){removeProgress();setLoading(false);toast('请求失败: '+(err.message||'未知错误'),'error');});}
      pump();
    }).catch(function(err){removeProgress();setLoading(false);toast('网络请求失败','error');});
}

function getFireAt(){
  return document.getElementById('sY').value+'-'+String(document.getElementById('sM').value).padStart(2,'0')+'-'
    +String(document.getElementById('sD').value).padStart(2,'0')+'T'+document.getElementById('sH').value+':'
    +document.getElementById('sMin').value+':00+08:00';
}
function scheduleOnce(){
  var t=document.getElementById('input').value.trim();if(!t){toast('请输入主题','error');return;}

    body:new URLSearchParams({topic:t,model:document.getElementById('modelSel').value,fire_at:getFireAt()})})

    .catch(function(){toast('请求失败','error');});
}

function copyHistory(msgId,btn){
  var el=document.getElementById(msgId),title=el.querySelector('.title').textContent,body=el.querySelector('.body').textContent;
  navigator.clipboard.writeText(title+'\n\n'+body).then(function(){
    btn.classList.add('copy-ok');btn.innerHTML='&#10003; 已复制';
    setTimeout(function(){btn.classList.remove('copy-ok');btn.innerHTML='&#128203; 复制全文';},2000);
  });
}

function renderMarkdown(t) {
  if (!t) return "";
  // Headings
  t = t.replace(/^### (.+)$/gm, "<h4>$1</h4>");
  t = t.replace(/^## (.+)$/gm, "<h3>$1</h3>");
  t = t.replace(/^# (.+)$/gm, "<h2>$1</h2>");
  // Bold
  t = t.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
  // Tables (simple pipe-to-table)
  t = t.replace(/^(\|.+\|)\n(\|[-| ]+\|)\n((?:\|.+\|\n?)+)/gm, function(m) {
    var lines = m.trim().split("\n").filter(function(l) { return l.indexOf("---") === -1; });
    var out = "<table>";
    lines.forEach(function(r) {
      out += "<tr>" + r.split("|").filter(function(c) { return c.trim(); }).map(function(c) { return "<td>" + c.trim() + "</td>"; }).join("") + "</tr>";
    });
    out += "</table>";
    return out;
  });
  // Horizontal rules
  t = t.replace(/^---+$/gm, "<hr>");
  // Bullet lists
  t = t.replace(/^- (.+)$/gm, "<li>$1</li>");
  t = t.replace(/((?:<li>.*<\/li>\n?)+)/g, function(m) { return "<ul>" + m + "</ul>"; });
  // Paragraphs
  t = t.replace(/\n\n/g, "</p><p>");
  t = t.replace(/\n/g, "<br>");
  return "<p>" + t + "</p>";
}

function keepVersion(msgId){
  var el=document.getElementById(msgId);
  if(!el) return;
  var title=el.querySelector('.title').textContent;
  // 获取当前显示的版本风格
  var currentStyle='';
  var tabs=el.querySelectorAll('.version-tab.on');
  if(tabs.length>0) currentStyle=tabs[0].textContent;
  if(!currentStyle&&state.versions[msgId]){
    // fallback: first version's style
    var vkeys=Object.keys(state.versions[msgId]);
    if(vkeys.length>0) currentStyle=state.versions[msgId][vkeys[0]].style;
  }
  // 尝试从已加载会话中匹配
  var sid=state.sid;
  if(!sid&&state.sessions.length>0){
    for(var i=0;i<state.sessions.length;i++){
      if(state.sessions[i].title===title){sid=state.sessions[i].id;break;}
    }
    if(!sid) sid=state.sessions[0].id;
  }
  if(!sid){toast('无法定位会话，请先生成内容','error');return;}
  el.querySelectorAll('.keep-btn').forEach(function(b){b.textContent='已选用';b.style.color='#10b981';b.style.borderColor='#10b981';});
  // 同时批准 + 记录版本风格
  var body=new URLSearchParams({session_id:sid});
  fetch('/api/review/approve',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:body})
    .then(function(){
      if(currentStyle){
        var sb=new URLSearchParams({session_id:sid,style:currentStyle});
        fetch('/api/performance/style',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:sb});
      }
      toast('已标记为选用版本');loadPendingReviews();loadSessions();loadStats();loadPerfDashboard();
    })
    .catch(function(){toast('标记失败','error');});
}


function stripHTML(h){var d=document.createElement('div');d.innerHTML=h;var nl=String.fromCharCode(10);var tables=d.querySelectorAll('table');for(var i=0;i<tables.length;i++){tables[i].insertAdjacentText('beforebegin',nl);tables[i].insertAdjacentText('afterend',nl)}var lis=d.querySelectorAll('li');for(var i=0;i<lis.length;i++){lis[i].insertAdjacentText('beforebegin','- ');lis[i].insertAdjacentText('afterend',nl)}var brs=d.querySelectorAll('br');for(var i=0;i<brs.length;i++){brs[i].insertAdjacentText('afterend',nl)}var blocks=d.querySelectorAll('h2,h3,h4,p,hr,ul');for(var i=0;i<blocks.length;i++){blocks[i].insertAdjacentText('afterend',nl+nl)}var txt=d.textContent;return txt.replace(new RegExp(nl+'{3,}','g'),nl+nl).trim()}function esc(s){if(!s)return '';var d=document.createElement('div');d.textContent=s;return d.innerHTML;}

// 质量趋势
// ============================================================
function loadTrends(){
  fetch('/api/stats/trends?days=60').then(function(r){return r.json()}).then(function(d){
    var h='';
    // 评分分布
    if(d.distribution&&d.distribution.length){
      h+='<div style="font-size:10px;color:var(--ts);margin-bottom:4px;font-weight:700">评分分布 (60天)</div>';
      d.distribution.forEach(function(b){
        h+='<div class="perf-dash-row"><span class="perf-dash-label">'+esc(b.bucket)+'</span>'
          +'<div class="perf-dash-bar-track"><div class="perf-dash-bar-fill" style="width:'+Math.round(b.cnt/Math.max.apply(null,d.distribution.map(function(x){return x.cnt}))*100)+'%;background:var(--g)"></div></div>'
          +'<span class="perf-dash-val">'+b.cnt+'篇</span></div>';
      });
    }
    // 覆盖率
    if(d.coverage){
      h+='<div style="font-size:10px;color:var(--ts);margin:6px 0">'
        +'活跃 '+d.coverage.active_days+' 天 &middot; 共 '+d.coverage.total_articles+' 篇'
        +'</div>';
    }
    // 按类型
    if(d.by_type&&d.by_type.length){
      h+='<div style="font-size:10px;color:var(--ts);margin:4px 0;font-weight:700">按类型均分</div>';
      d.by_type.forEach(function(t){
        var color=t.avg_score>=85?'var(--g)':t.avg_score>=75?'var(--w)':'var(--r)';
        h+='<div class="perf-dash-row"><span class="perf-dash-label">'+esc(t.content_type||'-')+'</span>'
          +'<div class="perf-dash-bar-track"><div class="perf-dash-bar-fill" style="width:'+Math.round(t.avg_score)+'%;background:'+color+'"></div></div>'
          +'<span class="perf-dash-val">'+t.avg_score+'分</span></div>';
      });
    }
    // 每日趋势（最近14天）
    if(d.daily&&d.daily.length){
      var recent=d.daily.slice(-14);
      var maxC=Math.max.apply(null,recent.map(function(x){return x.cnt||0}))||1;
      h+='<div style="font-size:10px;color:var(--ts);margin:8px 0 2px;font-weight:700">每日产出 (14天)</div>';
      h+='<div style="display:flex;align-items:flex-end;gap:2px;height:40px;padding:2px 0">';
      recent.forEach(function(day){
        var hPct=Math.round((day.cnt||0)/maxC*100);
        h+='<div title="'+day.day+': '+(day.avg_score||'-')+'分" style="flex:1;background:var(--p);height:'+Math.max(hPct,4)+'%;border-radius:2px 2px 0 0;opacity:0.7"></div>';
      });
      h+='</div>';
    }
    document.getElementById('trendsBody').innerHTML=h||'<div style="font-size:10px;color:var(--ts);padding:4px 0">暂无趋势数据</div>';
  }).catch(function(){document.getElementById('trendsBody').innerHTML='<div style="font-size:10px;color:var(--r)">加载失败</div>'});
}

function loadCoverage(){
  fetch('/api/stats/coverage?days=60').then(function(r){return r.json()}).then(function(d){
    var h='';
    h+='<div class="perf-dash-row"><span class="perf-dash-label">已生成</span><span class="perf-dash-val">'+(d.total_generated||0)+'篇</span></div>';
    h+='<div class="perf-dash-row"><span class="perf-dash-label">待排期</span><span class="perf-dash-val">'+(d.calendar_pending||0)+'篇</span></div>';
    // 类型覆盖
    var tc=d.type_coverage||{};
    Object.keys(tc).forEach(function(ct){
      h+='<div class="perf-dash-row"><span class="perf-dash-label">'+esc(ct)+'</span><span class="perf-dash-val">'+tc[ct].count+'篇</span></div>';
    });
    // 缺口
    var gaps=d.gaps||[];
    if(gaps.length>0){
      h+='<div style="font-size:10px;color:var(--r);margin:4px 0;font-weight:700">选题缺口</div>';
      gaps.forEach(function(g){
        h+='<div class="perf-dash-row"><span class="perf-dash-label">'+esc(g.type)+'</span><span class="perf-dash-val" style="color:var(--r)">缺'+g.gap+'篇</span></div>';
      });
    }
    document.getElementById('coverageBody').innerHTML=h||'<div style="font-size:10px;color:var(--ts);padding:4px 0">暂无数据</div>';
  }).catch(function(){document.getElementById('coverageBody').innerHTML='<div style="font-size:10px;color:var(--r)">加载失败</div>'});
}

// ============================================================
// 知识库管理
// ============================================================
function toggleKBManager(){
  var el=document.getElementById('kbManager');
  el.classList.toggle('hide');
  if(!el.classList.contains('hide')) loadKBList();
}
function loadKBList(){
  var q=(document.getElementById('kbSearchInput').value||'').toLowerCase();
  fetch('/api/knowledge').then(function(r){return r.json()}).then(function(d){
    var h='';
    (d.files||[]).forEach(function(f){
      if(q && f.title.toLowerCase().indexOf(q)===-1 && f.filename.toLowerCase().indexOf(q)===-1 && f.category.toLowerCase().indexOf(q)===-1) return;
      var catBadge=f.category?'<span class="kb-cat">'+esc(f.category)+'</span>':'';
      h+='<div class="kb-file" onclick="kbEdit(\''+esc(f.path)+'\')">'
        +'<span class="kb-fname">'+catBadge+esc(f.title||f.filename)+'</span>'
        +'<span class="kb-meta">'+(f.size>1024?(f.size/1024).toFixed(1)+'KB':f.size+'B')+'</span>'
        +'<span class="kb-del" onclick="event.stopPropagation();kbDelete(\''+esc(f.path)+'\')">x</span>'
        +'</div>';
    });
    document.getElementById('kbList').innerHTML=h||'<div style="font-size:10px;color:var(--ts);padding:8px;text-align:center">'+(q?'无匹配文件':'暂无知识库文件')+'</div>';
  });
}
function kbAddFile(){
  document.getElementById('kbEditPath').value='';
  document.getElementById('kbEditContent').value='';
  document.getElementById('kbEditor').classList.remove('hide');
}
function kbEdit(path){
  fetch('/api/knowledge/'+encodeURIComponent(path)).then(function(r){return r.json()}).then(function(d){
    if(d.error){toast(d.error,'error');return;}
    document.getElementById('kbEditPath').value=d.path;
    document.getElementById('kbEditContent').value=d.content;
    document.getElementById('kbEditor').classList.remove('hide');
  });
}
function kbSave(){
  var path=document.getElementById('kbEditPath').value.trim();
  var content=document.getElementById('kbEditContent').value;
  if(!path||!content){toast('请填写路径和内容','error');return;}
  if(!path.endsWith('.md')){toast('文件名必须以 .md 结尾','error');return;}
  fetch('/api/knowledge',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:new URLSearchParams({path:path,content:content})})
    .then(function(r){return r.json()}).then(function(d){
      if(d.error){toast(d.error,'error');return;}
      toast('已保存');document.getElementById('kbEditor').classList.add('hide');loadKBList();
    });
}
function kbDelete(path){
  if(!confirm('删除 '+path+' ？'))return;
  fetch('/api/knowledge',{method:'DELETE',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:new URLSearchParams({path:path})})
    .then(function(r){return r.json()}).then(function(d){
      if(d.error){toast(d.error,'error');return;}
      toast('已删除');loadKBList();
    });
}

// ============================================================
// 审核评论
// ============================================================
var _reviewCommentSid=null;
function openReviewComment(sid, el){
  _reviewCommentSid=sid;
  var existing=el.querySelector('.review-comments-inline');
  if(existing){existing.remove();return;}
  var div=document.createElement('div');
  div.className='review-comments-inline';
  div.innerHTML='<textarea class="rc-input" placeholder="添加批注..."></textarea>'
    +'<button class="rc-send" onclick="sendReviewComment(\''+sid+'\',this)">发送批注</button>'
    +'<div class="rc-list" id="rcList-'+sid+'"></div>';
  el.appendChild(div);
  loadReviewComments(sid);
}
function sendReviewComment(sid, btn){
  var textarea=btn.parentElement.querySelector('.rc-input');
  var comment=textarea.value.trim();
  if(!comment){toast('请输入批注内容','error');return;}
  fetch('/api/review/comment',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:new URLSearchParams({session_id:sid,comment:comment})})
    .then(function(r){return r.json()}).then(function(d){
      if(d.ok){textarea.value='';loadReviewComments(sid);toast('批注已添加');}
    });
}
function showAuditLog(sid, el){
  var existing=el.querySelector('.review-audit-inline');
  if(existing){existing.remove();return;}
  var div=document.createElement('div');
  div.className='review-audit-inline';
  div.innerHTML='<div style="font-size:10px;color:var(--ts);margin-bottom:4px">&#128269; 审核链路</div><div class="al-list" id="alList-'+sid+'">加载中...</div>';
  el.appendChild(div);
  fetch('/api/review/audit/'+sid).then(function(r){return r.json()}).then(function(d){
    var h='';
    (d.log||[]).forEach(function(entry){
      var actionLabel=entry.action==='approve'?'&#9989; 通过':entry.action==='reject'?'&#10060; 驳回':entry.action;
      h+='<div class="al-item">'
        +'<span class="al-action">'+actionLabel+'</span>'
        +'<span class="al-operator">'+esc(entry.operator||'system')+'</span>'
        +'<span class="al-time">'+(entry.created_at||'').slice(0,16)+'</span>'
        +(entry.from_status?'<span class="al-from">'+esc(entry.from_status)+'</span>':'')
        +'<span class="al-arrow">&#8594;</span>'
        +'<span class="al-to">'+esc(entry.to_status)+'</span>'
        +(entry.note?'<div class="al-note">'+esc(entry.note)+'</div>':'')
        +'</div>';
    });
    document.getElementById('alList-'+sid).innerHTML=h||'<div style="font-size:10px;color:var(--ts)">暂无审计记录</div>';
  });
}

function loadReviewComments(sid){
  fetch('/api/review/comments/'+sid).then(function(r){return r.json()}).then(function(d){
    var h='';
    (d.comments||[]).forEach(function(c){
      h+='<div class="rc-item"><span class="rc-author">'+esc(c.author||'reviewer')+'</span>'
        +'<span class="rc-stage">'+esc(c.stage||'')+'</span>'
        +'<span class="rc-time">'+(c.created_at||'').slice(0,16)+'</span>'
        +'<div class="rc-text">'+esc(c.comment)+'</div></div>';
    });
    var el=document.getElementById('rcList-'+sid);
    if(el)el.innerHTML=h||'<div style="font-size:10px;color:var(--ts)">暂无批注</div>';
  });
}
